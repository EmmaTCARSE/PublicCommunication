<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Text Display</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }

    /* ── screens ─────────────────────────────── */
    .screen {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .screen.active { display: flex; }

    /* ── input screen ────────────────────────── */
    #screen-input {
      gap: 20px;
      background: #111;
    }

    #screen-input h1 {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #eee;
    }

    textarea {
      width: 100%;
      max-width: 480px;
      height: 120px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 1.1rem;
      padding: 12px;
      resize: none;
      outline: none;
      line-height: 1.5;
      -webkit-appearance: none;
    }
    textarea::placeholder { color: #555; }
    textarea:focus { border-color: #555; }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 480px;
    }

    label {
      font-size: 0.85rem;
      color: #aaa;
      white-space: nowrap;
    }

    input[type="range"] {
      flex: 1;
      accent-color: #fff;
      height: 4px;
      cursor: pointer;
    }

    #speed-display {
      font-size: 0.9rem;
      color: #ccc;
      min-width: 42px;
      text-align: right;
    }

    button.primary {
      width: 100%;
      max-width: 480px;
      padding: 14px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    button.primary:active { opacity: 0.75; }

    .btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 480px;
    }
    .btn-row button {
      flex: 1;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .btn-row button:active { opacity: 0.75; }
    .btn-new  { background: #333; color: #fff; }
    .btn-replay { background: #fff; color: #000; }

    button.secondary {
      width: 100%;
      max-width: 480px;
      padding: 14px;
      background: #1e1e1e;
      color: #fff;
      border: 1px solid #444;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    button.secondary:active { opacity: 0.75; }
    button.secondary:disabled { opacity: 0.35; cursor: default; }
    button.primary:disabled { opacity: 0.35; cursor: default; }

    #export-status {
      font-size: 0.82rem;
      color: #777;
      min-height: 1.1em;
      text-align: center;
    }

    /* ── display screen ──────────────────────── */
    #screen-display {
      background: #000;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    #char-display {
      font-size: min(88vw, 88vh);
      font-weight: 700;
      line-height: 1;
      text-align: center;
      word-break: break-all;
      animation: fadein 0.1s ease-in;
    }

    @keyframes fadein {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── footer ──────────────────────────────── */
    .credit {
      position: fixed;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 0.05em;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- ── Input screen ── -->
  <div id="screen-input" class="screen active">
    <h1>Text Display</h1>

    <textarea id="text-input" placeholder="Enter text…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>

    <div class="row">
      <label for="speed-range">Speed</label>
      <input type="range" id="speed-range" min="0.2" max="5" step="0.1" value="1" />
      <span id="speed-display">1.0 s</span>
    </div>

    <button class="primary" id="btn-start">Start</button>
    <button class="secondary" id="btn-export" aria-label="Export video of text display">Export Video</button>
    <div id="export-status"></div>
  </div>

  <!-- ── Display screen ── -->
  <div id="screen-display" class="screen">
    <div id="char-display"></div>
  </div>

  <!-- credit shown on all screens -->
  <div class="credit">Created By TN</div>

  <script>
    // ── state ────────────────────────────────────
    let chars      = [];
    let charIdx    = 0;
    let interval   = 1000; // ms per character
    let timer      = null;
    let exporting  = false;

    // ── elements ─────────────────────────────────
    const screenInput   = document.getElementById('screen-input');
    const screenDisplay = document.getElementById('screen-display');
    const textInput     = document.getElementById('text-input');
    const speedRange    = document.getElementById('speed-range');
    const speedDisplay  = document.getElementById('speed-display');
    const btnStart      = document.getElementById('btn-start');
    const btnExport     = document.getElementById('btn-export');
    const exportStatus  = document.getElementById('export-status');
    const charDisplay   = document.getElementById('char-display');

    // ── helpers ───────────────────────────────────
    function showScreen(el) {
      [screenInput, screenDisplay].forEach(s => s.classList.remove('active'));
      el.classList.add('active');
    }

    function getChars(text) {
      // Correctly iterate over Unicode code points (handles emoji, CJK, etc.)
      return [...text];
    }

    // ── speed control ─────────────────────────────
    speedRange.addEventListener('input', () => {
      const v = parseFloat(speedRange.value);
      speedDisplay.textContent = v.toFixed(1) + ' s';
      interval = Math.round(v * 1000);
    });

    // ── start flow ────────────────────────────────
    btnStart.addEventListener('click', startFlow);

    function startFlow() {
      const text = textInput.value.trim();
      if (!text) { textInput.focus(); return; }

      chars   = getChars(text);
      charIdx = 0;

      showScreen(screenDisplay);
      showNextChar();
    }

    function showNextChar() {
      if (charIdx >= chars.length) {
        onDisplayEnd();
        return;
      }

      const ch = chars[charIdx++];
      // reset animation
      charDisplay.style.animation = 'none';
      void charDisplay.offsetWidth;
      charDisplay.style.animation = '';
      charDisplay.textContent = ch;

      timer = setTimeout(showNextChar, interval);
    }

    // ── end of display ────────────────────────────
    function onDisplayEnd() {
      // Return to input screen, keeping text & speed; add replay buttons
      showInputScreenWithButtons();
    }

    function showInputScreenWithButtons() {
      // Ensure replay/new buttons are present
      if (!document.getElementById('btn-row')) {
        const row = document.createElement('div');
        row.className = 'btn-row';
        row.id = 'btn-row';

        const btnNew = document.createElement('button');
        btnNew.className = 'btn-new';
        btnNew.textContent = 'New Text';
        btnNew.addEventListener('click', () => {
          textInput.value = '';
          textInput.focus();
        });

        const btnReplay = document.createElement('button');
        btnReplay.className = 'btn-replay';
        btnReplay.textContent = 'Replay';
        btnReplay.addEventListener('click', startFlow);

        row.appendChild(btnNew);
        row.appendChild(btnReplay);

        // Insert before the primary Start button
        btnStart.replaceWith(row);
        // Re-add Start below
        row.after(btnStart);
      }

      showScreen(screenInput);
    }

    // Tap/click on display screen to skip to end early (optional convenience)
    screenDisplay.addEventListener('click', () => {
      if (timer) { clearTimeout(timer); timer = null; }
      onDisplayEnd();
    });

    // ── export video ──────────────────────────────
    btnExport.addEventListener('click', exportVideo);

    async function exportVideo() {
      if (exporting) return;
      const text = textInput.value.trim();
      if (!text) { textInput.focus(); return; }

      if (!window.MediaRecorder) {
        alert('Video recording is not supported in this browser.');
        return;
      }

      const exportChars = getChars(text);
      const SIZE = 1080;

      const canvas = document.createElement('canvas');
      canvas.width  = SIZE;
      canvas.height = SIZE;
      const ctx = canvas.getContext('2d');

      if (!canvas.captureStream) {
        alert('Canvas capture is not supported in this browser.');
        return;
      }

      // Pick best supported MIME type (.mp4 preferred for iOS/macOS)
      const candidates = [
        'video/mp4;codecs=avc1',
        'video/mp4',
        'video/webm;codecs=vp9',
        'video/webm',
      ];
      const mimeType = candidates.find(t => MediaRecorder.isTypeSupported(t)) || 'video/webm';
      const ext = mimeType.startsWith('video/mp4') ? 'mp4' : 'webm';

      // UI: exporting state
      exporting = true;
      btnExport.disabled = true;
      btnStart.disabled  = true;
      btnExport.textContent = 'Exporting…';

      const stream   = canvas.captureStream(30);
      const recorder = new MediaRecorder(stream, { mimeType });
      const chunks   = [];
      recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      recorder.start();

      // Font fills ~80 % of the canvas height, matching the min(88vw,88vh) CSS display
      const fontSize = Math.floor(SIZE * 0.8);
      ctx.font         = `bold ${fontSize}px -apple-system, "Helvetica Neue", Arial, sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';

      for (let i = 0; i < exportChars.length; i++) {
        exportStatus.textContent = `${i + 1} / ${exportChars.length}`;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, SIZE, SIZE);
        ctx.fillStyle = '#fff';
        ctx.fillText(exportChars[i], SIZE / 2, SIZE / 2);
        await new Promise(r => setTimeout(r, interval));
      }

      recorder.stop();
      await new Promise(r => { recorder.onstop = r; });

      const blob     = new Blob(chunks, { type: mimeType });
      const filename = `text-display.${ext}`;

      // Reset UI
      exporting = false;
      btnExport.disabled    = false;
      btnStart.disabled     = false;
      btnExport.textContent = 'Export Video';
      exportStatus.textContent = '';

      // Try Web Share API with files (iOS / macOS)
      if (navigator.share && navigator.canShare) {
        const file = new File([blob], filename, { type: blob.type });
        if (navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ files: [file], title: 'Text Display' });
            return;
          } catch (e) {
            if (e.name === 'AbortError') return; // user cancelled
            // fall through to download on other errors
          }
        }
      }

      // Fallback: trigger file download
      const url = URL.createObjectURL(blob);
      const a   = document.createElement('a');
      a.href     = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      // Keep the object URL alive long enough for the download to start
      setTimeout(() => URL.revokeObjectURL(url), 30000);
    }
  </script>
</body>
</html>
